# ─────────────────────────────────────────────────────────────
# Reusable CI for Node.js components (frontend, etc.)
# ─────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      component:
        required: true
        type: string
      environment:
        required: false
        type: string
        default: 'development'
      node-version:
        required: false
        type: string
        default: '20'
      target_branch:
        required: true
        type: string
      enable_sonar:
        required: false
        type: boolean
        default: false
      is_docker:
        required: false
        type: boolean
        default: true
    secrets:
      SONAR_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false
      AZURE_CR_USERNAME:
        required: false
      AZURE_CR_PASSWORD:
        required: false
      NEXT_PUBLIC_SUPABASE_URL:
        required: false
      NEXT_PUBLIC_SUPABASE_ANON_KEY:
        required: false
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
        required: false
      NEXT_PUBLIC_API_URL:
        required: false

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment != '' && inputs.environment || 'development' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.component }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.component }}
        run: npm ci

      - name: Lint
        working-directory: ${{ inputs.component }}
        continue-on-error: true
        run: |
          if npm run --silent lint -- --help > /dev/null 2>&1; then
            npm run lint
          else
            echo "No lint script configured — skipping"
          fi

      - name: Test
        working-directory: ${{ inputs.component }}
        continue-on-error: true
        run: |
          if npm run --silent test -- --help > /dev/null 2>&1; then
            npm test -- --passWithNoTests
          else
            echo "No test script configured — skipping"
          fi

      - name: SonarQube Scan
        if: inputs.enable_sonar == true
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: ${{ inputs.component }}

      # Quality Gate step intentionally removed for bootstrap:
      # we only need scans to succeed so SonarQube dashboards populate.

      - name: Build Docker Image
        if: >
          inputs.is_docker == true && (
            github.event_name == 'push' ||
            (github.event_name == 'workflow_dispatch' &&
             github.ref == 'refs/heads/v1.2' &&
             github.event.inputs.deploy_to_production == 'true')
          )
        run: |
          SUPABASE_PUBLIC_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}"
          if [ -z "$SUPABASE_PUBLIC_KEY" ]; then
            SUPABASE_PUBLIC_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
          fi
          if [ "${{ inputs.component }}" = "frontend" ]; then
            docker build \
              --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
              --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLIC_KEY" \
              --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
              -t neurapodacr.azurecr.io/${{ inputs.component }}:${{ github.sha }} \
              -f ${{ inputs.component }}/docker/Dockerfile \
              ${{ inputs.component }}
          else
            docker build \
              -t neurapodacr.azurecr.io/${{ inputs.component }}:${{ github.sha }} \
              -f ${{ inputs.component }}/docker/Dockerfile \
              ${{ inputs.component }}
          fi

      - name: Login to ACR & Push
        if: |
          inputs.is_docker == true && (
            (github.event_name == 'push' && (
              github.ref == 'refs/heads/V1.2-dev' ||
              github.ref == 'refs/heads/v1.2-staging' ||
              github.ref == 'refs/heads/v1.2'
            )) ||
            (github.event_name == 'workflow_dispatch' &&
             github.ref == 'refs/heads/v1.2' &&
             github.event.inputs.deploy_to_production == 'true')
          )
        run: |
          echo "${{ secrets.AZURE_CR_PASSWORD }}" | \
            docker login neurapodacr.azurecr.io \
              -u "${{ secrets.AZURE_CR_USERNAME }}" \
              --password-stdin

          docker push neurapodacr.azurecr.io/${{ inputs.component }}:${{ github.sha }}
          echo "Pushed neurapodacr.azurecr.io/${{ inputs.component }}:${{ github.sha }}"
