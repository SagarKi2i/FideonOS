# ─────────────────────────────────────────────────────────────
# Frontend CI/CD
# ─────────────────────────────────────────────────────────────
# Note: no-op change to trigger CI rerun.
# Note: no-op change to trigger CI rerun (demo).

name: Frontend CI/CD

on:
  push:
    branches:
      - '[vV]*-dev'
      - 'v*-staging'
      - 'v1.2'
    paths:
      - 'frontend/**'
      - '.github/workflows/**'

  # Production App Service deploy is manual only: Actions → Frontend CI/CD → Run workflow (branch v1.2, enable deploy).
  workflow_dispatch:
    inputs:
      deploy_to_production:
        description: 'Deploy frontend to production App Service (requires branch v1.2)'
        type: boolean
        default: false

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    uses: ./.github/workflows/ci-component.yml
    with:
      component: frontend
      node-version: '20'
      target_branch: ${{ github.ref_name }}
      enable_sonar: ${{ (github.event_name == 'pull_request' && github.base_ref == 'V1.2-dev') || (github.event_name == 'push' && github.ref == 'refs/heads/V1.2-dev') }}
      is_docker: true
      environment: ${{ github.ref_name == 'v1.2' && 'production' || github.ref_name == 'v1.2-staging' && 'staging' || 'development' }}
    secrets: inherit

  deploy-dev:
    needs: ci
    if: github.ref == 'refs/heads/V1.2-dev' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-app-service.yml
    with:
      environment: development
      component: frontend
      image_sha: ${{ github.sha }}
    secrets: inherit

  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/v1.2-staging' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-app-service.yml
    with:
      environment: staging
      component: frontend
      image_sha: ${{ github.sha }}
    secrets: inherit

  deploy-production:
    needs: ci
    if: >
      github.ref == 'refs/heads/v1.2' &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_to_production == 'true'
    uses: ./.github/workflows/deploy-app-service.yml
    with:
      environment: production
      component: frontend
      image_sha: ${{ github.sha }}
    secrets: inherit
