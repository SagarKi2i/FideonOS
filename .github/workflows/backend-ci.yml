# ─────────────────────────────────────────────────────────────
# Backend CI/CD
# ─────────────────────────────────────────────────────────────
# Note: this comment is a no-op change to trigger a clean CI rerun.
# Note: no-op change to trigger CI rerun (staging).
# Note: no-op change to trigger CI rerun (demo).

name: Backend CI/CD

on:
  push:
    branches:
      - '[vV]*-dev'
      - 'v*-staging'
      - 'v1.2'
    paths:
      - 'backend/**'
      - '.github/workflows/**'

  # Production App Service deploy is manual only: Actions → Backend CI/CD → Run workflow (branch v1.2, enable deploy).
  workflow_dispatch:
    inputs:
      deploy_to_production:
        description: 'Deploy backend to production App Service (requires branch v1.2)'
        type: boolean
        default: false

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: ${{ github.ref_name == 'v1.2' && 'production' || github.ref_name == 'v1.2-staging' && 'staging' || 'development' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install --retries 5 --timeout 120 -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint
        working-directory: backend
        continue-on-error: true
        run: flake8 . --count --max-line-length=120 --extend-ignore=E501,F401 --statistics

      - name: Test
        working-directory: backend
        env:
          # config.py's Settings has no defaults for these two, so importing
          # `config` / `main` fails without them. Dummy values just satisfy the
          # import; real values come from the GitHub Environment at deploy time.
          SUPABASE_URL: https://ci.example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-test-service-role-key
        run: |
          if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            pytest --cov=. --cov-report=xml
          else
            echo "No test files found — skipping (non-blocking)"
          fi

      - name: SonarQube Scan
        if: >
          (github.event_name == 'pull_request' && github.base_ref == 'V1.2-dev') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/V1.2-dev')
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: backend

      # Quality Gate step intentionally removed for bootstrap:
      # we only need scans to succeed so SonarQube dashboards populate.

      - name: Build Docker Image
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' &&
           github.ref == 'refs/heads/v1.2' &&
           github.event.inputs.deploy_to_production == 'true')
        run: |
          docker build \
            -t neurapodacr.azurecr.io/backend:${{ github.sha }} \
            backend/

      - name: Login to ACR & Push
        if: |
          (github.event_name == 'push' && (
            github.ref == 'refs/heads/V1.2-dev' ||
            github.ref == 'refs/heads/v1.2-staging' ||
            github.ref == 'refs/heads/v1.2'
          )) ||
          (github.event_name == 'workflow_dispatch' &&
           github.ref == 'refs/heads/v1.2' &&
           github.event.inputs.deploy_to_production == 'true')
        run: |
          echo "${{ secrets.AZURE_CR_PASSWORD }}" | \
            docker login neurapodacr.azurecr.io \
              -u "${{ secrets.AZURE_CR_USERNAME }}" \
              --password-stdin

          docker push neurapodacr.azurecr.io/backend:${{ github.sha }}
          echo "Pushed neurapodacr.azurecr.io/backend:${{ github.sha }}"

  deploy-dev:
    needs: ci
    if: github.ref == 'refs/heads/V1.2-dev' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-app-service.yml
    with:
      environment: development
      component: backend
      image_sha: ${{ github.sha }}
    secrets: inherit

  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/v1.2-staging' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-app-service.yml
    with:
      environment: staging
      component: backend
      image_sha: ${{ github.sha }}
    secrets: inherit

  deploy-production:
    needs: ci
    if: >
      github.ref == 'refs/heads/v1.2' &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_to_production == 'true'
    uses: ./.github/workflows/deploy-app-service.yml
    with:
      environment: production
      component: backend
      image_sha: ${{ github.sha }}
    secrets: inherit
