# ─────────────────────────────────────────────────────────────
# Hotfix Pipeline
# Expedited pipeline for hotfix changes targeting v1.2 (production).
# Push to v1.2: quality checks + build/push images to ACR only (no production deploy).
# Deploy: Actions → Hotfix Pipeline → Run workflow (branch v1.2, enable deploy).
# After deploy, back-merge to V1.2-dev and v1.2-staging manually.
# ─────────────────────────────────────────────────────────────

name: Hotfix Pipeline

on:
  pull_request:
    branches:
      - 'v1.2'
    paths:
      - 'frontend/**'
      - 'backend/**'

  push:
    branches:
      - 'v1.2'
    paths:
      - 'frontend/**'
      - 'backend/**'

  workflow_dispatch:
    inputs:
      deploy_to_production:
        description: 'Deploy frontend + backend to production App Service (requires branch v1.2)'
        type: boolean
        default: false

concurrency:
  group: hotfix-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Quick quality gate ────────────────────────────────────────────────────
  quality-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend quick check
        working-directory: frontend
        continue-on-error: true
        run: |
          npm ci
          npm run lint || echo "Lint unavailable — skipping"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Backend quick check
        working-directory: backend
        continue-on-error: true
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8
          flake8 . --count --max-line-length=120 --extend-ignore=E501,F401 --statistics

  # ── Build & push frontend ──────────────────────────────────────────────────
  build-frontend:
    needs: quality-check
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.deploy_to_production == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Build Frontend Docker Image
        run: |
          SUPABASE_PUBLIC_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}"
          if [ -z "$SUPABASE_PUBLIC_KEY" ]; then
            SUPABASE_PUBLIC_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
          fi
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLIC_KEY" \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            -t neurapodacr.azurecr.io/frontend:${{ github.sha }} \
            -f frontend/docker/Dockerfile \
            frontend/

      - name: Push to ACR
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' &&
           github.ref == 'refs/heads/v1.2' &&
           github.event.inputs.deploy_to_production == 'true')
        run: |
          echo "${{ secrets.AZURE_CR_PASSWORD }}" | \
            docker login neurapodacr.azurecr.io \
              -u "${{ secrets.AZURE_CR_USERNAME }}" \
              --password-stdin
          docker push neurapodacr.azurecr.io/frontend:${{ github.sha }}

  # ── Build & push backend ───────────────────────────────────────────────────
  build-backend:
    needs: quality-check
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.deploy_to_production == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: |
          docker build \
            -t neurapodacr.azurecr.io/backend:${{ github.sha }} \
            backend/

      - name: Push to ACR
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' &&
           github.ref == 'refs/heads/v1.2' &&
           github.event.inputs.deploy_to_production == 'true')
        run: |
          echo "${{ secrets.AZURE_CR_PASSWORD }}" | \
            docker login neurapodacr.azurecr.io \
              -u "${{ secrets.AZURE_CR_USERNAME }}" \
              --password-stdin
          docker push neurapodacr.azurecr.io/backend:${{ github.sha }}

  # ── Deploy both to production App Service (manual only) ───────────────────
  deploy-hotfix-frontend:
    needs: [build-frontend, build-backend]
    if: >
      github.ref == 'refs/heads/v1.2' &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_to_production == 'true'
    uses: ./.github/workflows/deploy-app-service.yml
    with:
      environment: production
      component: frontend
      image_sha: ${{ github.sha }}
    secrets: inherit

  deploy-hotfix-backend:
    needs: [build-frontend, build-backend]
    if: >
      github.ref == 'refs/heads/v1.2' &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_to_production == 'true'
    uses: ./.github/workflows/deploy-app-service.yml
    with:
      environment: production
      component: backend
      image_sha: ${{ github.sha }}
    secrets: inherit
