# Reusable deploy to Azure App Service (Linux single container from ACR).
# Uses Azure CLI after RBAC login — does NOT use publish profile or Kudu /diagnostics/runtime
# (avoids "Failed to get app runtime OS" when SCM/Kudu is broken or blocked).
#
# Per GitHub Environment (e.g. development):
# - Variables: AZURE_SUBSCRIPTION_ID, AZURE_WEBAPP_FRONTEND, AZURE_WEBAPP_BACKEND, AZURE_RESOURCE_GROUP
#              AZURE_HEALTH_URL_* (optional)
# - Secrets: AZURE_CREDENTIALS, AZURE_CR_USERNAME, AZURE_CR_PASSWORD
# - Frontend deploy syncs (Environment secrets → App Service): NEXT_PUBLIC_SUPABASE_URL,
#   NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY (or NEXT_PUBLIC_SUPABASE_ANON_KEY), NEXT_PUBLIC_API_URL
#   (optional; defaults to https://<AZURE_WEBAPP_BACKEND>.azurewebsites.net when unset)
# - Backend deploy requires (Environment secrets — copied into the App Service each deploy):
#     SUPABASE_SERVICE_ROLE_KEY, and either SUPABASE_URL or NEXT_PUBLIC_SUPABASE_URL.
#     config.py has NO defaults for these — the container will not start if they are unset.
#     Optional: JWT_PRIVATE_KEY_B64 + JWT_PUBLIC_KEY_B64 (needed for login/JWT issuance unless the PEMs
#     are baked into the image), FRONTEND_URL (the CORS allow-origin in non-dev), ANTHROPIC_API_KEY
#     (only the chat / workflow-ai endpoints need it), RESEND_API_KEY, EMAIL_FROM, ANTHROPIC_MODEL,
#     VALKEY_URL. ENVIRONMENT is set automatically from the deploy target.
#   GitHub secrets are NOT visible to the container unless this workflow applies them here.
#
# If login fails with "No subscriptions found", the SP has no role on that subscription — see
# .github/DEPLOY-TROUBLESHOOTING.md ("Azure Login: No subscriptions found").
#
# azure/login@v2: do not pass subscription-id (or client-id/tenant-id) together with creds — the
# action ignores creds and then requires separate client-id/tenant-id/client-secret.

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      component:
        required: true
        type: string
      image_sha:
        required: true
        type: string
      acr_login_server:
        required: false
        type: string
        default: 'neurapodacr.azurecr.io'
    secrets:
      AZURE_CR_USERNAME:
        required: true
      AZURE_CR_PASSWORD:
        required: true
      AZURE_CREDENTIALS:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight - environment configuration
        shell: bash
        env:
          SUB: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          APP_FE: ${{ vars.AZURE_WEBAPP_FRONTEND }}
          APP_BE: ${{ vars.AZURE_WEBAPP_BACKEND }}
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          missing=""
          [ -z "$SUB" ] && missing="$missing AZURE_SUBSCRIPTION_ID"
          [ -z "$APP_FE" ] && missing="$missing AZURE_WEBAPP_FRONTEND"
          [ -z "$APP_BE" ] && missing="$missing AZURE_WEBAPP_BACKEND"
          [ -z "$RG" ] && missing="$missing AZURE_RESOURCE_GROUP"
          if [ -n "$missing" ]; then
            echo "ERROR: Missing required environment variables:$missing"
            echo "Set these in GitHub -> Settings -> Environments -> ${{ inputs.environment }} -> Variables"
            exit 1
          fi

      - name: Resolve App Service target
        id: target
        shell: bash
        env:
          COMPONENT: ${{ inputs.component }}
          HEALTH_URL_FE: ${{ vars.AZURE_HEALTH_URL_FRONTEND }}
          HEALTH_URL_BE: ${{ vars.AZURE_HEALTH_URL_BACKEND }}
        run: |
          if [ "$COMPONENT" = "frontend" ]; then
            APP="${{ vars.AZURE_WEBAPP_FRONTEND }}"
            CUSTOM_HEALTH="$HEALTH_URL_FE"
            DEFAULT_HEALTH="https://${APP}.azurewebsites.net/"
          else
            APP="${{ vars.AZURE_WEBAPP_BACKEND }}"
            CUSTOM_HEALTH="$HEALTH_URL_BE"
            DEFAULT_HEALTH="https://${APP}.azurewebsites.net/api/health"
          fi

          if [ -n "$CUSTOM_HEALTH" ]; then
            HEALTH_URL="$CUSTOM_HEALTH"
          else
            HEALTH_URL="$DEFAULT_HEALTH"
          fi

          # Log line must not use env-injected probe URL (GitHub masks it when it matches a secret).
          # Reconstruct from app name (Environment variable, not a secret) whenever probe matches default pattern.
          # Normalize trailing slashes so AZURE_HEALTH_URL_* can match the computed default.
          strip_slash() {
            echo "$1" | sed 's|/*$||'
          }
          H_NORM=$(strip_slash "$HEALTH_URL")
          D_NORM=$(strip_slash "$DEFAULT_HEALTH")

          DISPLAY_AS_DEFAULT="false"
          if [ -z "$CUSTOM_HEALTH" ]; then
            DISPLAY_AS_DEFAULT="true"
          elif [ "$H_NORM" = "$D_NORM" ]; then
            DISPLAY_AS_DEFAULT="true"
          fi

          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "health_url=$HEALTH_URL" >> "$GITHUB_OUTPUT"
          echo "health_display_as_default=$DISPLAY_AS_DEFAULT" >> "$GITHUB_OUTPUT"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container (Azure CLI — no Kudu)
        uses: azure/cli@v2
        with:
          azcliversion: 2.86.0
          inlineScript: |
            set -e
            az account set --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}"
            APP="${{ steps.target.outputs.app }}"
            RG="${{ vars.AZURE_RESOURCE_GROUP }}"
            IMAGE="${{ inputs.acr_login_server }}/${{ inputs.component }}:${{ inputs.image_sha }}"
            REG_URL="https://${{ inputs.acr_login_server }}"
            echo "Setting container image: $IMAGE"
            az webapp config container set \
              --name "$APP" \
              --resource-group "$RG" \
              --container-image-name "$IMAGE" \
              --container-registry-url "$REG_URL" \
              --container-registry-user "${{ secrets.AZURE_CR_USERNAME }}" \
              --container-registry-password "${{ secrets.AZURE_CR_PASSWORD }}"

      - name: App Service settings & restart
        shell: bash
        env:
          COMPONENT: ${{ inputs.component }}
          APP: ${{ steps.target.outputs.app }}
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          ENVIRONMENT: ${{ inputs.environment }}
          # ── Backend (read by backend/config.py) ──────────────────────────
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          JWT_PRIVATE_KEY_B64: ${{ secrets.JWT_PRIVATE_KEY_B64 }}
          JWT_PUBLIC_KEY_B64: ${{ secrets.JWT_PUBLIC_KEY_B64 }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          VALKEY_URL: ${{ secrets.VALKEY_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          OTP_BYPASS_EMAILS: ${{ secrets.OTP_BYPASS_EMAILS }}
          # ── Frontend (NEXT_PUBLIC_* baked at build; re-applied for SSR) ───
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: |
          set -e
          az account set --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}"

          if [ "$COMPONENT" = "frontend" ]; then
            FE_SETTINGS=(WEBSITES_PORT=3000)
            SUPABASE_CLIENT_KEY="${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-$NEXT_PUBLIC_SUPABASE_ANON_KEY}"
            if [ -n "$NEXT_PUBLIC_SUPABASE_URL" ]; then
              FE_SETTINGS+=("NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}")
            fi
            if [ -n "$SUPABASE_CLIENT_KEY" ]; then
              FE_SETTINGS+=("NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${SUPABASE_CLIENT_KEY}")
            fi
            API_URL="${NEXT_PUBLIC_API_URL}"
            if [ -z "$API_URL" ]; then
              BE_APP="${{ vars.AZURE_WEBAPP_BACKEND }}"
              if [ -n "$BE_APP" ]; then
                API_URL="https://${BE_APP}.azurewebsites.net"
              fi
            fi
            if [ -n "$API_URL" ]; then
              FE_SETTINGS+=("NEXT_PUBLIC_API_URL=${API_URL}")
            fi
            # Pin the app's own public URL so password-reset redirect_to is always correct
            # regardless of which URL the user accessed the frontend from.
            FE_APP_NAME="${{ vars.AZURE_WEBAPP_FRONTEND }}"
            APP_URL="${NEXT_PUBLIC_APP_URL:-https://${FE_APP_NAME}.azurewebsites.net}"
            FE_SETTINGS+=("NEXT_PUBLIC_APP_URL=${APP_URL}")
            # Disable Web Locks to prevent auth deadlock behind Azure APIM
            # (navigator.locks stalls in NODE_ENV=production, causing 403s on all Supabase queries)
            FE_SETTINGS+=("NEXT_PUBLIC_SUPABASE_AUTH_NO_WEB_LOCKS=true")
            if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$SUPABASE_CLIENT_KEY" ]; then
              echo "::warning::Frontend: set NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY or NEXT_PUBLIC_SUPABASE_ANON_KEY on the GitHub Environment so the App Service has Supabase client config at runtime."
            fi
            az webapp config appsettings set \
              --name "$APP" \
              --resource-group "$RG" \
              --settings "${FE_SETTINGS[@]}"
            az webapp restart --name "$APP" --resource-group "$RG"
            exit 0
          fi

          # Backend: runtime env must exist on the Web App (GitHub secrets alone are not enough).
          # config.py hard-requires only SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY at import time.
          # ANTHROPIC_API_KEY is optional (defaults to "" — only the AI endpoints need it).
          if [ -z "$SUPABASE_URL" ] && [ -n "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL"
          fi
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Backend deploy needs SUPABASE_SERVICE_ROLE_KEY and a Supabase project URL (set SUPABASE_URL or NEXT_PUBLIC_SUPABASE_URL on the GitHub Environment)."
            exit 1
          fi

          # FRONTEND_URL is the sole allowed CORS origin in non-development (see main.py),
          # and is also used in server-generated emails. Derive it if not set explicitly.
          BE_FRONTEND_URL="${FRONTEND_URL}"
          if [ -z "$BE_FRONTEND_URL" ] && [ -n "$NEXT_PUBLIC_APP_URL" ]; then
            BE_FRONTEND_URL="$NEXT_PUBLIC_APP_URL"
          fi
          if [ -z "$BE_FRONTEND_URL" ]; then
            FE_APP_VAR="${{ vars.AZURE_WEBAPP_FRONTEND }}"
            if [ -n "$FE_APP_VAR" ]; then
              BE_FRONTEND_URL="https://${FE_APP_VAR}.azurewebsites.net"
            fi
          fi
          if [ "$ENVIRONMENT" != "development" ] && [ -z "$BE_FRONTEND_URL" ]; then
            echo "::warning::FRONTEND_URL is unset and could not be derived — non-dev CORS will reject the browser. Set FRONTEND_URL (or the AZURE_WEBAPP_FRONTEND variable)."
          fi

          # EMAIL_FROM is the backend's send-from address (config.py: email_from).
          # Accept the legacy RESEND_FROM_EMAIL secret name as a fallback.
          BE_EMAIL_FROM="${EMAIL_FROM:-$RESEND_FROM_EMAIL}"

          SETTINGS=(WEBSITES_PORT=8080)
          SETTINGS+=("ENVIRONMENT=${ENVIRONMENT}")
          SETTINGS+=("SUPABASE_URL=${SUPABASE_URL}")
          SETTINGS+=("SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}")
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            SETTINGS+=("ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}")
          fi
          if [ -n "$ANTHROPIC_MODEL" ]; then
            SETTINGS+=("ANTHROPIC_MODEL=${ANTHROPIC_MODEL}")
          fi
          if [ -n "$BE_FRONTEND_URL" ]; then
            SETTINGS+=("FRONTEND_URL=${BE_FRONTEND_URL}")
          fi
          if [ -n "$RESEND_API_KEY" ]; then
            SETTINGS+=("RESEND_API_KEY=${RESEND_API_KEY}")
          fi
          if [ -n "$BE_EMAIL_FROM" ]; then
            SETTINGS+=("EMAIL_FROM=${BE_EMAIL_FROM}")
          fi
          if [ -n "$VALKEY_URL" ]; then
            SETTINGS+=("VALKEY_URL=${VALKEY_URL}")
          fi
          if [ -n "$OTP_BYPASS_EMAILS" ]; then
            SETTINGS+=("OTP_BYPASS_EMAILS=${OTP_BYPASS_EMAILS}")
          fi
          # RS256 keys: config.py reads the *_B64 vars in priority over the on-disk PEM paths.
          # Required for login / JWT issuance unless the PEMs are baked into the image (backend/keys/).
          if [ -n "$JWT_PRIVATE_KEY_B64" ] && [ -n "$JWT_PUBLIC_KEY_B64" ]; then
            SETTINGS+=("JWT_PRIVATE_KEY_B64=${JWT_PRIVATE_KEY_B64}")
            SETTINGS+=("JWT_PUBLIC_KEY_B64=${JWT_PUBLIC_KEY_B64}")
          else
            echo "::warning::JWT_PRIVATE_KEY_B64 / JWT_PUBLIC_KEY_B64 not both set — auth will fail at token issuance unless the RS256 PEMs are baked into the image at backend/keys/."
          fi

          az webapp config appsettings set \
            --name "$APP" \
            --resource-group "$RG" \
            --settings "${SETTINGS[@]}"
          echo "Restarting backend web app..."
          az webapp restart --name "$APP" --resource-group "$RG"

      - name: Health check
        shell: bash
        env:
          CURL_URL: ${{ steps.target.outputs.health_url }}
          COMPONENT: ${{ inputs.component }}
          TARGET_APP: ${{ steps.target.outputs.app }}
          HEALTH_DISPLAY_AS_DEFAULT: ${{ steps.target.outputs.health_display_as_default }}
        run: |
          if [ -z "$CURL_URL" ]; then
            echo "::error::Health probe URL is empty. Check Environment variables AZURE_WEBAPP_FRONTEND / AZURE_WEBAPP_BACKEND and optional AZURE_HEALTH_URL_*."
            exit 1
          fi
          if [ -z "$TARGET_APP" ]; then
            echo "::error::Resolved App Service name (app output) is empty after preflight — workflow bug or skipped resolve step."
            exit 1
          fi

          # Backend: larger image + gunicorn cold start; allow more time than frontend.
          if [ "$COMPONENT" = "backend" ]; then
            ATTEMPTS=18
            SLEEP_SEC=15
            CURL_MAX=25
            START_DELAY=20
          else
            # Frontend: App Service still has to pull the new image and cold-start the
            # Next standalone server on the first deploy of a SHA. The old 8x10s (~80s)
            # window closed before the container was reachable and reported false 000s,
            # so give it a grace period plus a wider window.
            ATTEMPTS=12
            SLEEP_SEC=15
            CURL_MAX=20
            START_DELAY=20
          fi

          # Don't probe the instant `az webapp restart` returns — the container is not
          # up yet. A 000 during this gap is expected, not a failure.
          if [ "$START_DELAY" -gt 0 ]; then
            echo "Waiting ${START_DELAY}s for container pull/start before first probe..."
            sleep "$START_DELAY"
          fi

          for i in $(seq 1 "$ATTEMPTS"); do
            if curl -sfSL --max-time "$CURL_MAX" "$CURL_URL" > /dev/null 2>&1; then
              # Build this string in-shell from TARGET_APP only so GitHub does not mask the URL
              # (env CURL_URL is often fully redacted when it matches a registered secret).
              if [ "$HEALTH_DISPLAY_AS_DEFAULT" = "true" ]; then
                if [ "$COMPONENT" = "frontend" ]; then
                  echo "Healthy: https://${TARGET_APP}.azurewebsites.net/"
                else
                  echo "Healthy: https://${TARGET_APP}.azurewebsites.net/api/health"
                fi
              else
                echo "Healthy: probe succeeded (custom AZURE_HEALTH_URL_* — URL omitted from logs to avoid secret masking) webapp=${TARGET_APP}"
              fi
              exit 0
            fi
            echo "Health check failed ($i/$ATTEMPTS) webapp=${TARGET_APP}, retrying in ${SLEEP_SEC}s..."
            if [ "$i" -lt "$ATTEMPTS" ]; then
              sleep "$SLEEP_SEC"
            fi
          done

          # One non-fatal diagnostic (no -f): surface HTTP code or 000 if TCP/ TLS failed
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time "$CURL_MAX" "$CURL_URL" 2>/dev/null || echo "000")
          echo "::error::Health check exhausted retries. Last HTTP status: ${HTTP_CODE} (000 = no response — container down, wrong port, or still starting). webapp=${TARGET_APP} component=${COMPONENT}"
          if [ "$COMPONENT" = "backend" ]; then
            echo "Hints: Azure Portal → App Service → Log stream / Container logs. Confirm WEBSITES_PORT=8080 and required app settings (SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, JWT_*_B64). Default probe is GET /api/health."
          else
            echo "Hints: Confirm WEBSITES_PORT=3000, image listens on 3000, and NEXT_PUBLIC_* synced from GitHub Environment if the app needs them at runtime."
          fi
          exit 1
