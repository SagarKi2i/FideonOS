{% extends "_base.html" %}
{% block content %}
<h2>Two-factor authentication</h2>
<p>Enter the 6-digit code from your authenticator app.</p>
{% if error %}<p class="err" data-testid="mfa-error">{{ error }}</p>{% endif %}
<form method="post" action="/mfa">
  <label for="c">TOTP code</label>
  <input id="c" name="code" type="text" inputmode="numeric" pattern="\d{6}" maxlength="6"
         data-testid="mfa-totp-code" autocomplete="one-time-code" required>
  <button type="submit" data-testid="mfa-submit">Verify</button>
</form>
{% endblock %}
