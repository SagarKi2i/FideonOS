{% extends "_base.html" %}
{% block content %}
<h2>Sign in</h2>
<p>Enter the broker portal credentials.</p>
{% if error %}<p class="err" data-testid="login-error">{{ error }}</p>{% endif %}
<form method="post" action="/login">
  <label for="u">Username</label>
  <input id="u" name="username" type="text" data-testid="login-username" autocomplete="username" required>
  <label for="p">Password</label>
  <input id="p" name="password" type="password" data-testid="login-password" autocomplete="current-password" required>
  <button type="submit" data-testid="login-submit">Sign in</button>
</form>
{% endblock %}
